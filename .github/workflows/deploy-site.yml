name: Deploy site

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment-Ziel"
        required: true
        default: "stage"
        type: choice
        options:
          - stage
          - live

permissions:
  contents: read

concurrency:
  group: deploy-site-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare public files
        run: |
          mkdir -p public/images
          cp index.html public/
          cp 404.html public/
          cp impressum.html public/
          cp datenschutz.html public/
          cp styles.css public/
          cp script.js public/
          cp gallery.json public/
          cp contact.php public/
          cp update-fixtures.php public/
          cp fixtures.json public/
          cp robots.txt public/
          cp sitemap.xml public/
          cp favicon.ico public/
          cp favicon-32x32.png public/
          cp apple-touch-icon.png public/
          cp android-chrome-192x192.png public/
          cp android-chrome-512x512.png public/
          cp site.webmanifest public/
          cp .htaccess public/
          cp images/logo.png public/images/
          cp images/hero-badminton.png public/images/
          cp images/hero-badminton.webp public/images/
          if [ -d images/gallery ]; then
            mkdir -p public/images/gallery
            cp -R images/gallery/. public/images/gallery/
          fi

      - name: Protect stage with basic auth
        if: ${{ inputs.target == 'stage' }}
        env:
          STAGE_HTPASSWD_LINE: ${{ secrets.STAGE_HTPASSWD_LINE }}
          STAGE_HTPASSWD_PATH: ${{ secrets.STAGE_HTPASSWD_PATH }}
        run: |
          test -n "$STAGE_HTPASSWD_LINE"
          test -n "$STAGE_HTPASSWD_PATH"
          printf '%s\n' "$STAGE_HTPASSWD_LINE" > public/.htpasswd
          cat >> public/.htaccess <<EOF

          ErrorDocument 404 /stage/404.html
          Header set X-Robots-Tag "noindex, nofollow, noarchive"
          AuthType Basic
          AuthName "SCG Badminton Stage"
          AuthUserFile $STAGE_HTPASSWD_PATH
          Require valid-user
          EOF

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload site
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PROTOCOL: ${{ secrets.DEPLOY_PROTOCOL || 'ftp' }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PASSWORD"
          test -n "$DEPLOY_PATH"
          lftp -u "$DEPLOY_USER","$DEPLOY_PASSWORD" "$DEPLOY_PROTOCOL://$DEPLOY_HOST" -e "
            set cmd:fail-exit yes;
            set ftp:ssl-allow true;
            set ssl:verify-certificate no;
            cd $DEPLOY_PATH;
            mirror --reverse --verbose --only-newer public/ ./;
            bye;
          "
